<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chronicle — Hearthshire</title>

<style>

/* =========================
   СБРОС
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* =========================
   BODY
========================= */

body{
    width:100%;
    min-height:100vh;

    display:flex;
    justify-content:center;

    background:
        linear-gradient(rgba(20,12,10,.40), rgba(20,12,10,.40)),
        url('hearthshire-sunset.png');

    background-size:cover;
    background-position:center top;
    background-repeat:no-repeat;

    overflow-x:hidden;

    font-family:Georgia, serif;
}

/* =========================
   КОНТЕЙНЕР
========================= */

.chronicle-wrapper{

    width:min(90vw, 1200px);

    display:flex;
    justify-content:center;
    align-items:flex-start;

    padding:60px 0;
}

/* =========================
   РАМКА
========================= */

.chronicle-frame{

    width:100%;
    height:auto;

    display:block;

    filter:
        drop-shadow(0 30px 50px rgba(0,0,0,.45));

    animation:fadeIn 1.4s ease;
}

/* =========================
   АНИМАЦИЯ
========================= */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(20px) scale(.98);
    }

    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }

}

/* =========================
   ПЛАНШЕТЫ
========================= */

@media(max-width:1000px){

    .chronicle-wrapper{
        width:94vw;
        padding:40px 0;
    }

}

/* =========================
   МОБИЛКА
========================= */

@media(max-width:800px){

    body{
        background-position:center top;
    }

    .chronicle-wrapper{
        width:96vw;
        padding:24px 0;
    }

}

</style>
</head>

<body>

<div class="chronicle-wrapper">

    <img
        src="chronicle-frame.png"
        alt="Chronicle"
        class="chronicle-frame"
    >

</div>

</body>
</html>
