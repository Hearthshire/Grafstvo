<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronicle — Hearthshire</title>

<style>
/* =========================
   СБРОС СТИЛЕЙ
========================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* =========================
   ФОН НА ВЕСЬ ЭКРАН
========================= */
body {
    width: 100%;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    
    /* Установили chronicle-frame.png как главный и единственный фон */
    background: 
        linear-gradient(rgba(20, 12, 10, 0.40), rgba(20, 12, 10, 0.40)),
        url('chronicle-frame.png');
    
    background-size: cover;       /* Растягивает картинку, чтобы она закрыла весь экран */
    background-position: center top; /* Центрирует фон */
    background-repeat: no-repeat; /* Запрещает размножение картинки */
    background-attachment: fixed; /* Фиксирует фон при скролле (опционально, для красоты) */
    
    overflow-x: hidden;
    font-family: Georgia, serif;
    
    /* Анимация плавного появления самого фона при загрузке */
    animation: fadeInBg 1.4s ease forwards;
}

/* =========================
   КОНТЕЙНЕР ДЛЯ КОНТЕНТА
========================= */
.chronicle-wrapper {
    width: min(90vw, 1200px);
    min-height: 80vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    
    /* Делаем область прозрачной, так как рамка теперь на фоне */
    background: transparent; 
    padding: 60px 20px;
}

/* =========================
   АНИМАЦИЯ ПОЯВЛЕНИЯ ФОНА
========================= */
@keyframes fadeInBg {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}

/* =========================
   АДАПТИВНОСТЬ ПОД ЭКРАНЫ
========================= */
@media(max-width: 1000px) {
    .chronicle-wrapper {
        width: 94vw;
        padding: 40px 15px;
    }
}

@media(max-width: 800px) {
    .chronicle-wrapper {
        width: 96vw;
        padding: 24px 10px;
    }
}
</style>
</head>

<body>

    <div class="chronicle-wrapper">
        </div>

</body>
</html>
