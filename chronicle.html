<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chronicle — Hearthshire</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
        linear-gradient(rgba(20,12,10,.45), rgba(20,12,10,.45)),
        url('hearthshire-sunset.png');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    overflow-x:hidden;

    font-family:Georgia, serif;
}

/* ОСНОВНАЯ РАМКА */

.chronicle-wrapper{
    width:min(92vw, 1400px);

    display:flex;
    justify-content:center;
    align-items:center;

    padding:40px 0;
}

/* ИЗОБРАЖЕНИЕ РАМКИ */

.chronicle-frame{
    width:100%;
    display:block;

    filter:
        drop-shadow(0 30px 50px rgba(0,0,0,.45));

    animation:fadeIn 1.4s ease;
}

/* АНИМАЦИЯ */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(20px) scale(.98);
    }

    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }

}

/* МОБИЛКА */

@media(max-width:800px){

    .chronicle-wrapper{
        width:96vw;
        padding:20px 0;
    }

}

</style>
</head>

<body>

<div class="chronicle-wrapper">

    <img
        src="chronicle-frame.png"
        alt="Chronicle"
        class="chronicle-frame"
    >

</div>

</body>
</html>
