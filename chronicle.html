<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronicle — Hearthshire</title>

<style>
/* =========================
   1. СБРОС СТИЛЕЙ
========================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* =========================
   2. ОБЩИЙ ФОН ЭКРАНА
========================= */
body {
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    
    /* Используем глубокий темный цвет, чтобы убрать полосы по бокам */
    background-color: #160e0b; 
    
    /* Вторичный фон: та же картинка, но растянутая на весь экран для бесшовности */
    background-image: 
        linear-gradient(rgba(22, 14, 11, 0.40), rgba(22, 14, 11, 0.40)),
        url('chronicle-frame.png');
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
    
    overflow: hidden; 
    font-family: Georgia, serif;
}

/* =========================
   3. ГЛАВНЫЙ КОНТЕЙНЕР КНИГИ
========================= */
.chronicle-container {
    position: relative;
    /* Книга займет максимум высоты экрана, не обрезая меню сверху */
    height: 96vh; 
    aspect-ratio: 1920 / 1080; /* Сохраняем оригинальные пропорции твоей картинки */
    max-width: 100vw;
    
    display: flex;
    justify-content: center;
    align-items: center;
    
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    animation: fadeIn 1s ease forwards;
}

/* Сама подложка интерфейса */
.bg-frame {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain; /* Картинка сжимается ювелирно, сохраняя иконки */
    z-index: 1;
}

/* =========================
   4. НЕВИДИМАЯ НАВИГАЦИЯ (Поверх нарисованных иконок)
========================= */
.nav-overlay {
    position: absolute;
    /* Точное позиционирование в области, где нарисованы твои иконки */
    top: 2%; 
    left: 35%;
    width: 38%;
    height: 6%;
    
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 9999;
    background: transparent; /* Полностью прозрачная */
}

/* Кликабельные зоны для каждой иконки */
.nav-link {
    width: 22%;
    height: 100%;
    background: transparent;
    cursor: pointer;
    text-decoration: none;
    border-radius: 4px;
    transition: background 0.2s ease;
}

/* Подсветка при наведении (опционально, можно убрать) */
.nav-link:hover {
    background: rgba(255, 220, 190, 0.08); 
}

/* =========================
   5. ОБЛАСТЬ ДЛЯ ТВОЕГО СЛАЙДЕРА И ТЕКСТА
========================= */
.chronicle-wrapper {
    position: absolute;
    /* Позиционируем контент точно на страницы раскрытой книги */
    top: 14%;
    left: 10%;
    width: 80%;
    height: 80%;
    
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    z-index: 10;
    background: transparent;
    
    /* Отступы внутри страниц */
    padding: 2% 4%;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.98); }
    to { opacity: 1; transform: scale(1); }
}

/* =========================
   6. АДАПТИВНОСТЬ ДЛЯ МОБИЛЬНЫХ
========================= */
@media (max-width: 800px) {
    body {
        overflow-y: auto;
        height: auto;
    }
    .chronicle-container {
        height: auto;
        aspect-ratio: auto;
        width: 100vw;
        display: flex;
        flex-direction: column;
    }
    .bg-frame {
        position: relative;
        width: 100%;
        height: auto;
    }
    .nav-overlay {
        top: 15px;
        left: 5%;
        width: 90%;
        height: 40px;
    }
    .chronicle-wrapper {
        position: relative;
        top: 0;
        left: 0;
        width: 100%;
        height: auto;
        padding: 20px;
    }
}
</style>
</head>

<body>

    <div class="chronicle-container">
        
        <img src="chronicle-frame.png" alt="Interface" class="bg-frame">

        <nav class="nav-overlay">
            <a href="estate.html" class="nav-link" title="The Estate"></a>
            <a href="waterworks.html" class="nav-link" title="Waterworks"></a>
            <a href="garden.html" class="nav-link" title="Garden"></a>
            <a href="chronicle.html" class="nav-link" title="Chronicle"></a>
        </nav>

        <div class="chronicle-wrapper">
            </div>

    </div>

</body>
</html>
