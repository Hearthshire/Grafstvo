<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronicle — Hearthshire</title>

<style>
/* =========================
   СБРОС СТИЛЕЙ
========================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* =========================
   ФОН (Идеальное масштабирование под монитор)
========================= */
body {
    width: 100%;
    height: 100vh; /* Строго фиксируем высоту по экрану */
    display: flex;
    justify-content: center;
    align-items: center; /* Центрируем контент ровно посередине монитора */
    
    /* Темный цвет-подложка в тон краев картинки на случай очень широких экранов */
    background-color: #1a110d; 
    
    background-image: 
        linear-gradient(rgba(20, 12, 10, 0.20), rgba(20, 12, 10, 0.20)),
        url('chronicle-frame.png');
    
    /* ИЗМЕНЕНО: Отказываемся от грубого cover. 
       contain гарантирует, что картинка ВСЕГДА полностью поместится в окно браузера */
    background-size: contain; 
    background-position: center center; /* Ровно по центру */
    background-repeat: no-repeat;
    
    overflow: hidden; /* Убираем лишние полосы прокрутки, так как это цельный интерфейс */
    font-family: Georgia, serif;
    
    animation: fadeInBg 1s ease forwards;
}

/* =========================
   КОНТЕЙНЕР ДЛЯ КОНТЕНТА ВНУТРИ КНИГИ
   (Позиционируется точно под внутреннее окошко рамки)
========================= */
.chronicle-wrapper {
    /* Автоматически подстраиваем размер контентной зоны под размеры фоновой книги */
    width: 100%;
    max-width: 1200px;
    height: 100%;
    max-height: 800px;
    
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    
    background: transparent; 
    
    /* Отступы, чтобы ваш будущий текст/кнопки/слайдер ложились строго внутрь страниц раскрытой книги */
    padding: 18% 12% 10% 12%; 
}

/* =========================
   АНИМАЦИЯ ПОЯВЛЕНИЯ
========================= */
@keyframes fadeInBg {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* =========================
   АДАПТИВНОСТЬ (Если монитор слишком узкий/вертикальный)
========================= */
@media (max-aspect-ratio: 16/10) {
    body {
        /* Если монитор квадратный или нестандартный, плавно адаптируем размер */
        background-size: 100% auto;
    }
}
</style>
</head>

<body>

    <div class="chronicle-wrapper">
        </div>

</body>
</html>
