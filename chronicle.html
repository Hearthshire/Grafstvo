<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronicle — Hearthshire</title>

<style>
/* =========================
   СБРОС СТИЛЕЙ
========================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* =========================
   ФОН (Идеальное заполнение экрана)
========================= */
body {
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center; /* Центрируем книгу ровно посредине экрана */
    
    /* Затемнение фона и сама картинка */
    background-image: 
        linear-gradient(rgba(20, 12, 10, 0.20), rgba(20, 12, 10, 0.20)),
        url('chronicle-frame.png');
    
    /* cover убирает полосы по бокам, растягивая картинку на 100% ширины и высоты */
    background-size: cover; 
    /* Фиксируем центр изображения, чтобы интерфейс не съезжал */
    background-position: center center; 
    background-repeat: no-repeat;
    
    overflow: hidden; /* Отключаем прокрутку самого экрана */
    font-family: Georgia, serif;
    
    animation: fadeInBg 1s ease forwards;
}

/* =========================
   КОНТЕЙНЕР ДЛЯ КОНТЕНТА ВНУТРИ КНИГИ
   (Эта область прозрачна и наложена на страницы книги)
========================= */
.chronicle-wrapper {
    width: 100%;
    max-width: 1200px;
    height: 100%;
    max-height: 800px;
    
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    
    background: transparent; 
    
    /* Процентные отступы, чтобы ваш текст, слайдер и стрелки 
       всегда оставались внутри нарисованных страниц книги */
    padding: 18% 12% 10% 12%; 
}

/* =========================
   АНИМАЦИЯ ПОЯВЛЕНИЯ
========================= */
@keyframes fadeInBg {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>
</head>

<body>

    <div class="chronicle-wrapper">
        </div>

</body>
</html>
