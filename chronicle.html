<!DOCTYPE html>
<html lang="ru">
<head>

<title>Chronicle — Hearthshire</title>

<style>
/* =========================
   1. СБРОС СТИЛЕЙ
========================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* =========================
   2. БАЗОВЫЙ ФОН И ЭКРАН (ПК и Мониторы)
========================= */
body {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    
    background-color: #1a110d; /* Цвет-подложка под тон краев вашей картинки */
    background-image: 
        linear-gradient(rgba(20, 12, 10, 0.20), rgba(20, 12, 10, 0.20)),
        url('chronicle-frame.png');
    
    /* Идеальное заполнение экрана без пустых полос по бокам */
    background-size: cover; 
    background-position: center center; 
    background-repeat: no-repeat;
    
    overflow: hidden; /* Отключаем полосы прокрутки самого экрана для сохранения интерфейса */
    font-family: Georgia, serif;
    
    animation: fadeInBg 1s ease forwards;
}

/* =========================
   3. ВЕРХНЕЕ МЕНЮ (Навигация)
========================= */
/* Жесткая фиксация панели на переднем плане поверх книги на ПК */
.nav-container, nav, .menu, [class*="nav"], [class*="menu"] {
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
    
    position: absolute !important;
    top: 0 !important;
    left: 0 !important;
    
    width: 100% !important;
    height: 80px !important; 
    padding: 0 40px !important;
    z-index: 9999 !important; /* Выталкивает меню на самый верхний слой */
    background: transparent;
}

/* Элементы внутри меню (иконка + текст) */
.nav-item, .menu-item, nav a, .nav-container a {
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    text-align: center !important;
    text-decoration: none !important;
    color: #ffdcbe !important; 
    margin: 0 25px !important; /* Комфортный отступ между кнопками */
    transition: transform 0.3s ease !important;
}
