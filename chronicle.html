<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronicle — Hearthshire</title>

<style>
/* =========================
   СБРОС СТИЛЕЙ
========================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* =========================
   BODY (Умная адаптация фона)
========================= */
body {
    width: 100%;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start; /* Позволяет контенту скроллиться вниз, если он большой */
    
    /* Базовый цвет под цвет рамки, чтобы при адаптации не было белых полей */
    background-color: #140c0a; 
    
    background-image: 
        linear-gradient(rgba(20, 12, 10, 0.20), rgba(20, 12, 10, 0.20)),
        url('chronicle-frame.png');
    
    /* ИЗМЕНЕНО: На десктопах используем cover для заполнения, центрируем по верху */
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
    background-attachment: fixed; /* Задник зафиксирован, контент плывет сверху */
    
    overflow-x: hidden;
    font-family: Georgia, serif;
    
    animation: fadeInBg 1.2s ease forwards;
}

/* =========================
   КОНТЕЙНЕР ДЛЯ ТЕКСТА
   (Подстраивается под изгибы рамки)
========================= */
.chronicle-wrapper {
    width: min(85vw, 1100px);
    min-height: 90vh;
    margin: 40px auto;
    
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    
    background: transparent; 
    
    /* Внутренние отступы, чтобы текст не вылезал за границы нарисованной рамки */
    padding: 80px 60px; 
}

/* =========================
   АНИМАЦИЯ
========================= */
@keyframes fadeInBg {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* =========================
   АДАПТИВНОСТЬ ДЛЯ ПЛАНШЕТОВ
========================= */
@media(max-width: 1024px) {
    body {
        /* Переключаем на contain, чтобы на планшетах рамка вошла ПЕРЕМЕННО целиком */
        background-size: contain;
        background-attachment: scroll; /* На мобильных fixed-фоны часто лагают */
    }
    
    .chronicle-wrapper {
        width: 90vw;
        padding: 60px 40px;
        margin: 20px auto;
    }
}

/* =========================
   ИДЕАЛЬНАЯ МОБИЛЬНАЯ ВЕРСИЯ (Смартфоны)
========================= */
@media(max-width: 600px) {
    body {
        /* На телефонах 'contain' гарантирует, что пропорции картинки не нарушатся */
        background-size: 100% auto; 
        background-position: center top;
    }
    
    .chronicle-wrapper {
        width: 95vw;
        /* Уменьшаем отступы, так как на смартфонах рамка становится уже */
        padding: 45px 20px 30px 20px; 
        margin: 10px auto;
    }
}

/* Для совсем маленьких экранов */
@media(max-width: 400px) {
    .chronicle-wrapper {
        padding: 35px 15px 20px 15px;
    }
}
</style>
</head>

<body>

    <div class="chronicle-wrapper">
        </div>

</body>
</html>
