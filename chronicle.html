<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronicle — Hearthshire</title>

<style>
/* =========================
   1. СБРОС СТИЛЕЙ
========================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* =========================
   2. БАЗОВЫЙ ФОН И ЭКРАН (ПК и Мониторы)
========================= */
body {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    
    background-color: #1a110d; /* Цвет-подложка под тон краев картинки */
    background-image: 
        linear-gradient(rgba(20, 12, 10, 0.20), rgba(20, 12, 10, 0.20)),
        url('chronicle-frame.png');
    
    /* Бесшовное заполнение экрана без пустых полос по бокам */
    background-size: cover; 
    background-position: center center; 
    background-repeat: no-repeat;
    
    overflow: hidden; /* Фиксируем интерфейс на ПК */
    font-family: Georgia, serif;
    
    animation: fadeInBg 1s ease forwards;
}

/* =========================
   3. ВЕРХНЕЕ МЕНЮ (Навигация)
========================= */
.nav-container, nav, .menu, [class*="nav"], [class*="menu"] {
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
    
    position: absolute !important;
    /* Опустили ниже, чтобы ссылки легли на деревянную рамку и не перекрывали верхний текст */
    top: 35px !important; 
    left: 0 !important;
    
    width: 100% !important;
    height: 60px !important; 
    padding: 0 40px !important;
    z-index: 9999 !important; /* Меню гарантированно поверх всего контента */
    background: transparent;
}

/* Ссылки внутри меню */
.nav-item, .menu-item, nav a, .nav-container a {
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    text-align: center !important;
    text-decoration: none !important;
    color: #e0caaf !important; /* Винтажный песочно-золотой цвет */
    margin: 0 25px !important; 
    transition: all 0.3s ease !important;
}

/* Иконки-символы над текстом кнопок */
.nav-icon {
    font-size: 20px !important;
    margin-bottom: 6px !important;
    color: #cca573 !important;
}

.nav-item span {
    font-size: 13px !important;
    letter-spacing: 1px !important;
    text-transform: uppercase;
}

/* Эффект наведения мышки */
.nav-item:hover, nav a:hover, .nav-container a:hover {
    transform: translateY(-2px) scale(1.03) !important;
    color: #ffffff !important;
}
.nav-item:hover .nav-icon {
    color: #ffdfb3 !important;
}

/* Стиль для активной страницы (Chronicle) */
.nav-item.active {
    color: #ffdfb3 !important;
    border-bottom: 1px solid #cca573;
    padding-bottom: 2px;
}

/* =========================
   4. КОНТЕЙНЕР ДЛЯ КОНТЕНТА ВНУТРИ КНИГИ
========================= */
.chronicle-wrapper {
    width: 100%;
    max-width: 1200px;
    height: calc(100vh - 110px);
    /* Компенсируем новое, более низкое положение навигации */
    margin-top: 110px; 
    
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    
    background: transparent; 
    /* Процентные отступы удерживают ваш слайдер и текст строго на страницах книги */
    padding: 8% 12% 5% 12%; 
    position: relative;
    z-index: 1;
}

/* =========================
   5. АНИМАЦИЯ ПОЯВЛЕНИЯ
========================= */
@keyframes fadeInBg {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* =========================
   6. ИДЕАЛЬНАЯ АДАПТИВНОСТЬ ПОД МОБИЛЬНЫЕ
========================= */
@media (max-width: 800px) {
    body {
        overflow-y: auto; /* Позволяем скроллить контент на телефонах */
        height: auto;
        min-height: 100vh;
    }

    /* ИКОНКИ СТРОГО ПО ЦЕНТРУ ЭКРАНА НА СМАРТФОНАХ */

        position: relative !important; 
        top: 0 !important;
        height: auto !important;
