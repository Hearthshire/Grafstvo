<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hearthshire</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#2f2426;
    overflow:hidden;
    font-family:Georgia, serif;
}

/* ОСНОВНОЙ ЭКРАН */

.hero{
    position:relative;

    width:100vw;
    height:100vh;

    background-image:url('heartshire-home.png');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

/* КОНТЕЙНЕР КАРТОЧЕК */

.cards{
    position:absolute;

    left:50%;
    bottom:2.2vw;

    transform:translateX(-50%);

    display:flex;
    gap:1.45vw;

    width:88vw;

    justify-content:center;
}

/* КАРТОЧКИ */

.card{
    display:block;

    width:21vw;
    max-width:300px;

    aspect-ratio: 0.78 / 1;

    border-radius:28px;

    overflow:hidden;

    transition:
        transform .25s ease,
        filter .25s ease,
        box-shadow .25s ease;

    cursor:pointer;
}

/* PNG ВНУТРИ */

.card img{
    width:100%;
    height:100%;

    object-fit:cover;

    display:block;
}

/* HOVER */

.card:hover{
    transform:translateY(-10px) scale(1.02);

    filter:brightness(1.03);

    box-shadow:
        0 18px 40px rgba(0,0,0,0.35),
        0 0 25px rgba(255,220,190,0.18);
}

/* МОБИЛКИ */

@media(max-width:1200px){

.cards{
    gap:12px;
    bottom:20px;
}

.card{
    width:22vw;
}

}

@media(max-width:900px){

.hero{
    height:auto;
    min-height:100vh;
    padding-bottom:40px;
}

.cards{
    position:relative;

    left:auto;
    bottom:auto;

    transform:none;

    width:100%;

    padding:20px;

    margin-top:58vh;

    flex-wrap:wrap;
}

.card{
    width:42%;
}

}

@media(max-width:600px){

.card{
    width:90%;
    max-width:320px;
}

.cards{
    justify-content:center;
}

}

</style>
</head>

<body>

<section class="hero">

<div class="cards">

<a href="estate.html" class="card">
<img src="estate-card.png" alt="The Estate">
</a>

<a href="waterworks.html" class="card">
<img src="waterworks-card.png" alt="Waterworks">
</a>

<a href="garden.html" class="card">
<img src="garden-card.png" alt="Garden">
</a>

<a href="chronicle.html" class="card">
<img src="chronicle-card.png" alt="Chronicle">
</a>

</div>

</section>

</body>
</html>
