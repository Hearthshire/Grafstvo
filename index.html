<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hearthshire</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#2f2426;
    font-family:Georgia, serif;
}

/* ОСНОВНОЙ ЭКРАН */

.hero{
    position:relative;

    width:100vw;
    height:100vh;

    background-image:url('hearthshire-background.png');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

/* КОНТЕЙНЕР КАРТОЧЕК */

.cards{
    position:absolute;

    left:50%;
    bottom:6.5%;

    transform:translateX(-50%);

    display:flex;
    gap:26px;
}

/* КЛИКАБЕЛЬНЫЕ PNG КАРТОЧКИ */

.card{
    display:block;

    width:295px;
    height:430px;

    border-radius:28px;

    overflow:hidden;

    transition:
        transform .25s ease,
        filter .25s ease;

    cursor:pointer;
}

.card:hover{
    transform:translateY(-6px);

    filter:brightness(1.03);
}

.card img{
    width:100%;
    height:100%;

    object-fit:cover;

    display:block;
}

</style>
</head>

<body>

<section class="hero">

<div class="cards">

<a href="estate.html" class="card">
    <img src="estate-card.png" alt="The Estate">
</a>

<a href="waterworks.html" class="card">
    <img src="waterworks-card.png" alt="Waterworks">
</a>

<a href="garden.html" class="card">
    <img src="garden-card.png" alt="Garden">
</a>

<a href="chronicle.html" class="card">
    <img src="chronicle-card.png" alt="Chronicle">
</a>

</div>

</section>

</body>
</html>
