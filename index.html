<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Hearthshire</title>

<style>

body {
    margin: 0;
    font-family: Georgia, serif;
    overflow: hidden;
    background: #2f2426;
}

header {
    position: relative;
    width: 100vw;
    height: 100vh;

    background-image:
        linear-gradient(
            rgba(0,0,0,0.12),
            rgba(0,0,0,0.28)
        ),
        url('hearthshire-set.png');

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* Контейнер */

.hotspots {
    position: absolute;
    inset: 0;
}

/* Карточки */

.hotspot {
    position: absolute;
    cursor: pointer;

    border-radius: 22px;

    background: rgba(103, 74, 70, 0.82);

    backdrop-filter: blur(4px);

    box-shadow:
        0 8px 24px rgba(0,0,0,0.25);

    transition:
        transform 0.25s ease,
        box-shadow 0.25s ease,
        background 0.25s ease;
}

.hotspot:hover {
    transform: translateY(-4px);

    box-shadow:
        0 12px 30px rgba(0,0,0,0.35);

    background: rgba(120, 88, 84, 0.9);
}

/* The Estate */

.estate {
    left: 13%;
    bottom: 10%;

    width: 16%;
    height: 18%;
}

/* Waterworks */

.waterworks {
    left: 32%;
    bottom: 10%;

    width: 16%;
    height: 18%;
}

/* Garden */

.garden {
    left: 51%;
    bottom: 10%;

    width: 16%;
    height: 18%;
}

/* Chronicle */

.chronicle {
    left: 70%;
    bottom: 10%;

    width: 16%;
    height: 18%;
}

</style>
</head>

<body>

<header>

<div class="hotspots">

<a href="#" class="hotspot estate"></a>

<a href="#" class="hotspot waterworks"></a>

<a href="#" class="hotspot garden"></a>

<a href="#" class="hotspot chronicle"></a>

</div>

</header>

</body>
</html>
