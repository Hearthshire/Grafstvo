<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hearthshire</title>
<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  overflow-x: hidden;
  background-color: #2f2426;
}

header {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: url('heartshire-home.png') center/cover no-repeat;
}

/* Контейнер для карточек */
.cards-container {
  position: absolute;
  bottom: 5%;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 2%;
  pointer-events: none; /* чтобы фон не мешал */
}

/* Карточки */
.card {
  position: relative;
  width: 200px; /* можно подогнать под макет */
  height: 250px; /* можно подогнать под макет */
  cursor: pointer;
  pointer-events: auto;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card img {
  width: 100%;
  height: 100%;
  border-radius: 20px;
  display: block;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(255,220,200,0.4);
}

</style>
</head>
<body>
<header>
  <div class="cards-container">
    <a href="#" class="card"><img src="estate-card.png" alt="The Estate"></a>
    <a href="#" class="card"><img src="waterworks-card.png" alt="Waterworks"></a>
    <a href="#" class="card"><img src="garden-card.png" alt="Garden"></a>
    <a href="#" class="card"><img src="chronicle-card.png" alt="Chronicle"></a>
  </div>
</header>
</body>
</html>
