<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hearthshire</title>

<style>
/* ОБЩИЕ СТИЛИ И СБРОС */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    width: 100%; 
    height: 100vh;
    overflow: hidden;
    background: #4a2f35;
    font-family: Georgia, serif;
}

/* Скрытый заголовок для SEO */
.visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    border: 0;
}

/* ОСНОВНОЙ ФОН */
.hero {
    position: relative;
    width: 100%;
    height: 100vh;
    background-image: url('hearthshire-sun.png'); /* Новая основная фоновая картинка */
    background-size: cover; 
    background-position: top center; 
    background-repeat: no-repeat;
}

/* КОНТЕЙНЕР КАРТОЧЕК (ДЕСКТОП) */
.cards {
    position: absolute;
    left: 50%;
    bottom: 7vh;
    transform: translateX(-50%);
    display: flex;
    justify-content: center;
    gap: 0.8vw;
    width: 95vw;
}

/* КАРТОЧКИ (ПОЛНОСТЬЮ ПРОЗРАЧНЫЙ ФОН) */
.card {
    display: block;
    width: 19vw;
    max-width: 280px; 
    aspect-ratio: 280 / 270; 
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    outline: none;
    
    /* Начальная прозрачность самой PNG-карточки до наведения */
    opacity: 0.5;

    /* ИЗМЕНЕНО: Фон сделан прозрачным, так как у вас готовые затененные PNG */
    background: transparent; 
    backdrop-filter: none;          
    -webkit-backdrop-filter: none;  
    border: none; 
    
    transition:
        transform .25s ease,
        filter .25s ease,
        box-shadow .25s ease,
        opacity .25s ease;
}

/* PNG КАРТОЧЕК */
.card img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    background: transparent;
}

/* ЭФФЕКТ НАВЕДЕНИЯ (Мышь) */
@media (hover: hover) {
    .card:hover {
        transform: translateY(-8px) scale(1.02);
        filter: brightness(1.03);
        box-shadow:
            0 18px 40px rgba(0,0,0,0.35),
            0 0 24px rgba(255,220,190,0.18);
        opacity: 1; /* При наведении карточка становится сочной и плотной */
    }
}

/* НАВИГАЦИЯ С КЛАВИАТУРЫ */
.card:focus-visible {
    transform: translateY(-8px);
    outline: 3px solid #ffdcbe;
    outline-offset: 4px;
    opacity: 1;
}

/* ПЛАНШЕТЫ */
@media(max-width: 1100px) {
    .cards {
        width: 98vw;
        gap: 10px;
    }
    .card {
        width: 22vw;
    }
}

/* ИДЕАЛЬНАЯ МОБИЛЬНАЯ ВЕРСИЯ БЕЗ СТРОННИХ ФОНОВ */
@media(max-width: 800px) {
    body {
        overflow-x: hidden;
        overflow-y: auto;
        height: auto;
    }

    .hero {
        display: flex;
        flex-direction: column;
        justify-content: flex-end; /* Опускает сетку меню в нижнюю часть экрана */
        height: auto;
        min-height: 100vh;
        background-position: center top;
    }

    .cards {
        position: relative;
        left: auto;
        bottom: auto;
        transform: none;
        
        width: 100%;
        margin-top: 40vh; /* Оставляет верхнюю часть экрана под чистый вид дома */
        padding: 16px 16px 40px 16px;
        
        display: grid;
        grid-template-columns: 1fr 1fr; /* Компактная сетка 2х2 */
        gap: 12px;
        
        /* ИЗМЕНЕНО: Никаких градиентов и заливок, только чистый фон дома hearthshire-sun.png */
        background: transparent; 
    }

    .card {
        width: 100%; 
        max-width: none;
        
        /* На смартфонах увеличиваем базовую видимость PNG, чтобы текст сразу хорошо читался */
        opacity: 0.85; 
        
        background: transparent;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        border: none;
    }
}

/* Оптимизация для совсем узких экранов */
@media(max-width: 400px) {
    .cards {
        margin-top: 30vh;
        gap: 8px;
        padding: 12px 8px 30px 8px;
    }
}
</style>
</head>

<body>

<section class="hero">
    <h1 class="visually-hidden">Hearthshire — Главная</h1>

    <div class="cards">
        <a href="estate.html" class="card">
            <img src="estate-card.png" alt="The Estate" width="280" height="270">
        </a>

        <a href="waterworks.html" class="card">
            <img src="waterworks-card.png" alt="Waterworks" width="280" height="270">
        </a>

        <a href="garden.html" class="card">
            <img src="garden-card.png" alt="Garden" width="280" height="270">
        </a>

        <a href="chronicle.html" class="card">
            <img src="chronicle-card.png" alt="Chronicle" width="280" height="270">
        </a>
    </div>
</section>

</body>
</html>
