<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hearthshire</title>

<style>
/* ОБЩИЕ СТИЛИ И СБРОС */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    width: 100%; 
    height: 100vh;
    display: flex;
    flex-direction: column; /* Выстраиваем фон и плашку вертикально */
    overflow: hidden;
    background: #4a2f35;
    font-family: Georgia, serif;
}

/* Скрытый заголовок для поисковых роботов (SEO) и скринридеров */
.visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    border: 0;
}

/* ОСНОВНОЙ ФОН */
.hero {
    position: relative;
    width: 100%;
    flex-grow: 1; /* Занимает всё оставшееся пространство сверху от плашки */
    background-image: url('heartshire-home.png');
    background-size: cover; 
    background-position: top center; 
    background-repeat: no-repeat;
}

/* НОВАЯ ОДНОТОННАЯ ПОДЛОЖКА ВНИЗУ */
.cards-wrapper {
    width: 100%;
    background: #4a2f35; /* Фирменный темно-коричневый цвет */
    padding: 4vh 0; /* Внутренние отступы сверху и снизу от карточек */
    box-shadow: 0 -15px 35px rgba(0, 0, 0, 0.4); /* Мягкая тень, отделяющая плашку от арта */
    display: flex;
    justify-content: center;
    z-index: 10;
}

/* КОНТЕЙНЕР КАРТОЧЕК */
.cards {
    display: flex;
    justify-content: center;
    gap: 0.8vw;
    width: 95vw;
}

/* КАРТОЧКИ */
.card {
    display: block;
    width: 19vw;
    max-width: 280px; 
    aspect-ratio: 280 / 270; /* Пропорции ваших картинок 280х270 */
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    outline: none;
    transition:
        transform .25s ease,
        filter .25s ease,
        box-shadow .25s ease;
}

/* PNG КАРТОЧЕК */
.card img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    background: transparent;
}

/* ЭФФЕКТ НАВЕДЕНИЯ (Только для устройств с мышкой) */
@media (hover: hover) {
    .card:hover {
        transform: translateY(-8px) scale(1.02);
        filter: brightness(1.03);
        box-shadow:
            0 14px 30px rgba(0,0,0,0.4),
            0 0 20px rgba(255,220,190,0.15);
    }
}

/* НАВИГАЦИЯ С КЛАВИАТУРЫ */
.card:focus-visible {
    transform: translateY(-8px);
    outline: 3px solid #ffdcbe;
    outline-offset: 4px;
}

/* ПЛАНШЕТЫ */
@media(max-width: 1100px) {
    .cards {
        width: 98vw;
        gap: 10px;
    }

    .card {
        width: 22vw;
    }
}

/* МОБИЛЬНАЯ ВЕРСИЯ */
@media(max-width: 800px) {
    body {
        overflow: auto;
        height: auto;
    }

    .hero {
        height: 50vh; /* На мобильных отдаем картинке ровно половину экрана */
        flex-grow: 0;
    }

    .cards-wrapper {
        padding: 20px;
        box-shadow: none;
    }

    .cards {
        width: 100%;
        flex-wrap: wrap;
        justify-content: center;
    }

    .card {
        width: 42%;
        max-width: none;
    }
}

@media(max-width: 560px) {
    .card {
        width: 90%;
    }
}
</style>
</head>

<body>

    <section class="hero">
        <h1 class="visually-hidden">Hearthshire — Главная</h1>
    </section>

    <div class="cards-wrapper">
        <div class="cards">
            <a href="estate.html" class="card">
                <img src="estate-card.png" alt="The Estate" width="280" height="270">
            </a>

            <a href="waterworks.html" class="card">
                <img src="waterworks-card.png" alt="Waterworks" width="280" height="270">
            </a>

            <a href="garden.html" class="card">
                <img src="garden-card.png" alt="Garden" width="280" height="270">
            </a>

            <a href="chronicle.html" class="card">
                <img src="chronicle-card.png" alt="Chronicle" width="280" height="270">
            </a>
        </div>
    </div>

</body>
</html>
