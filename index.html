<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hearthshire</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#2f2426;
    font-family:Georgia, serif;
}

/* ОСНОВНОЙ ФОН */

.hero{
    position:relative;

    width:100vw;
    height:100vh;

    background-image:url('heartshire-home.png');
    background-size:contain;
    background-position:top center;
    background-repeat:no-repeat;
}

/* КОНТЕЙНЕР КАРТОЧЕК */

.cards{

    position:absolute;

    left:50%;
    bottom:7vh; /* подняли карточки выше */

    transform:translateX(-50%);

    display:flex;
    justify-content:center;

    gap:0.8vw;

    width:95vw;
}

/* КАРТОЧКИ */

.card{

    display:block;

    width:17vw;
    max-width:380px;

    aspect-ratio:1.35 / 1;

    border-radius:28px;

    overflow:hidden;

    cursor:pointer;

    transition:
        transform .25s ease,
        filter .25s ease,
        box-shadow .25s ease;
}

/* PNG */

.card img{

    width:100%;
    height:100%;

    object-fit:cover;

    display:block;
}

/* HOVER */

.card:hover{

    transform:
        translateY(-8px)
        scale(1.02);

    filter:brightness(1.03);

    box-shadow:
        0 18px 40px rgba(0,0,0,0.35),
        0 0 24px rgba(255,220,190,0.18);
}

/* ПЛАНШЕТЫ */

@media(max-width:1100px){

.cards{
    width:98vw;
    gap:10px;
}

.card{
    width:22vw;
}

}

/* МОБИЛЬНАЯ ВЕРСИЯ */

@media(max-width:800px){

body{
    overflow:auto;
}

.hero{

    height:auto;
    min-height:100vh;

    background-size:cover;

    padding-bottom:40px;
}

.cards{

    position:relative;

    left:auto;
    bottom:auto;

    transform:none;

    width:100%;

    padding:20px;

    margin-top:60vh;

    flex-wrap:wrap;

    justify-content:center;
}

.card{
    width:42%;
    max-width:none;
}

}

@media(max-width:560px){

.card{
    width:90%;
}

}

</style>
</head>

<body>

<section class="hero">

<div class="cards">

<a href="estate.html" class="card">
<img src="estate-card.png" alt="The Estate">
</a>

<a href="waterworks.html" class="card">
<img src="waterworks-card.png" alt="Waterworks">
</a>

<a href="garden.html" class="card">
<img src="garden-card.png" alt="Garden">
</a>

<a href="chronicle.html" class="card">
<img src="chronicle-card.png" alt="Chronicle">
</a>

</div>

</section>

</body>
</html>
