<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hearthshire</title>

<style>
/* ОБЩИЕ СТИЛИ И СБРОС */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    width: 100%; 
    height: 100vh;
    overflow: hidden;
    background: #4a2f35;
    font-family: Georgia, serif;
}

/* Скрытый заголовок для поисковых роботов (SEO) и скринридеров */
.visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    border: 0;
}

/* ОСНОВНОЙ ФОН */
.hero {
    position: relative;
    width: 100%;
    height: 100vh;
    background-image: url('hearthshire-sun.png');
    background-size: cover; /* Картинка на весь экран */
    background-position: top center; 
    background-repeat: no-repeat;
}

/* КОНТЕЙНЕР КАРТОЧЕК */
.cards {
    position: absolute;
    left: 50%;
    bottom: 7vh;
    transform: translateX(-50%);
    display: flex;
    justify-content: center;
    gap: 0.8vw;
    width: 95vw;
}

/* КАРТОЧКИ (ЭФФЕКТ СТЭКЛА) */
.card {
    display: block;
    width: 19vw;
    max-width: 280px; 
    aspect-ratio: 280 / 270; 
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    outline: none;
    
    /* СТИЛИ СТЕКЛА (GLASSMORPHISM) */
    background: rgba(255, 255, 255, 0.07); /* Очень легкая белая подложка для проявления стекла */
    backdrop-filter: blur(12px);          /* Размытие того, что НАХОДИТСЯ ЗА карточкой */
    -webkit-backdrop-filter: blur(12px);  /* Поддержка для Safari */
    border: 1px solid rgba(255, 255, 255, 0.15); /* Тонкая стеклянная грань по краям */
    
    transition:
        transform .25s ease,
        filter .25s ease,
        box-shadow .25s ease,
        background .25s ease;
}

/* PNG КАРТОЧЕК */
.card img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    background: transparent;
}

/* ЭФФЕКТ НАВЕДЕНИЯ (Только для устройств с мышкой) */
@media (hover: hover) {
    .card:hover {
        transform: translateY(-8px) scale(1.02);
        background: rgba(255, 255, 255, 0.12); /* Стекло становится чуть плотнее при наведении */
        filter: brightness(1.05);
        box-shadow:
            0 20px 40px rgba(0,0,0,0.4),
            0 0 20px rgba(255,220,190,0.15);
    }
}

/* НАВИГАЦИЯ С КЛАВИАТУРЫ */
.card:focus-visible {
    transform: translateY(-8px);
    outline: 3px solid #ffdcbe;
    outline-offset: 4px;
}

/* ПЛАНШЕТЫ */
@media(max-width: 1100px) {
    .cards {
        width: 98vw;
        gap: 10px;
    }

    .card {
        width: 22vw;
    }
}

/* МОБИЛЬНАЯ ВЕРСИЯ */
@media(max-width: 800px) {
    body {
        overflow: auto;
        height: auto;
    }

    .hero {
        min-height: 100vh;
        height: auto;
        padding-bottom: 40px;
    }

    .cards {
        position: relative;
        left: auto;
        bottom: auto;
        transform: none;
        width: 100%;
        padding: 20px;
        margin-top: 55vh;
        flex-wrap: wrap;
        justify-content: center;
    }

    .card {
        width: 42%;
        max-width: none;
        /* На мобильных можно сделать размытие чуть меньше для экономии батареи смартфона */
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
    }
}

@media(max-width: 560px) {
    .card {
        width: 90%;
    }
}
</style>
</head>

<body>

<section class="hero">
    <h1 class="visually-hidden">Hearthshire — Главная</h1>

    <div class="cards">
        <a href="estate.html" class="card">
            <img src="estate-card.png" alt="The Estate" width="280" height="270">
        </a>

        <a href="waterworks.html" class="card">
            <img src="waterworks-card.png" alt="Waterworks" width="280" height="270">
        </a>

        <a href="garden.html" class="card">
            <img src="garden-card.png" alt="Garden" width="280" height="270">
        </a>

        <a href="chronicle.html" class="card">
            <img src="chronicle-card.png" alt="Chronicle" width="280" height="270">
        </a>
    </div>
</section>

</body>
</html>
