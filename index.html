<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hearthshire</title>

<style>
/* ОБЩИЕ СТИЛИ И СБРОС */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    width: 100%; 
    height: 100vh;
    overflow: hidden;
    background: #0f0a0c; /* Сделали базовый фон чуть темнее для красивого проявления */
    font-family: Georgia, serif;
}

.visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    border: 0;
}

/* ОСНОВНОЙ ФОН С АНИМАЦИЕЙ ПОЯВЛЕНИЯ */
.hero {
    position: relative;
    width: 100%;
    height: 100vh;
    background-image: url('hearthshire-sun.png');
    background-size: cover; 
    background-position: top center; 
    background-repeat: no-repeat;
    
    /* Элемент улучшения 2: Плавное проявление */
    animation: fadeInBackground 1.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
}

/* КОНТЕЙНЕР КАРТОЧЕК */
.cards {
    position: absolute;
    left: 50%;
    bottom: 7vh;
    transform: translateX(-50%);
    display: flex;
    justify-content: center;
    gap: 0.8vw;
    width: 95vw;
    z-index: 5;
    
    /* Плавное появление карточек чуть позже фона */
    animation: fadeInCards 1.2s cubic-bezier(0.25, 1, 0.5, 1) 0.4s both;
}

/* КАРТОЧКИ (ПОЛИРОВКА СТИЛЯ) */
.card {
    display: block;
    width: 19vw;
    max-width: 280px; 
    aspect-ratio: 280 / 270; 
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    outline: none;
    background: transparent;
    
    /* Элемент улучшения 4: вместо жесткого opacity уходим в изящную атмосферную дымку */
    opacity: 0.6;
    filter: contrast(0.95) brightness(0.9);
    
    /* Элемент улучшения 3: подготовка видеокарты к плавной анимации */
    will-change: transform, opacity, filter;
    
    transition:
        transform .4s cubic-bezier(0.25, 1, 0.5, 1),
        filter .4s cubic-bezier(0.25, 1, 0.5, 1),
        box-shadow .4s cubic-bezier(0.25, 1, 0.5, 1),
        opacity .4s cubic-bezier(0.25, 1, 0.5, 1);
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    background: transparent;
}

/* ЭФФЕКТ НАВЕДЕНИЯ (Улучшенный, более глубокий) */
@media (hover: hover) {
    .card:hover {
        transform: translateY(-12px) scale(1.03); /* Чуть выше и объемнее */
        filter: contrast(1) brightness(1.05);
        opacity: 1;
        box-shadow:
            0 20px 45px rgba(0, 0, 0, 0.4),
            0 0 30px rgba(255, 210, 170, 0.2); /* Теплое свечение под цвет заката */
    }
}

.card:focus-visible {
    transform: translateY(-12px);
    outline: 3px solid #ffdcbe;
    outline-offset: 4px;
    opacity: 1;
    filter: contrast(1) brightness(1.05);
}

/* ПЛАНШЕТЫ */
@media(max-width: 1100px) {
    .cards {
        width: 98vw;
        gap: 10px;
    }
    .card {
        width: 22vw;
    }
}

/* МОБИЛЬНАЯ ВЕРСИЯ (ВАШ ПРЕДЫДУЩИЙ ИДЕАЛЬНЫЙ ВАРИАНТ) */
@media(max-width: 800px) {
    body {
        overflow-x: hidden;
        overflow-y: auto;
        height: auto;
    }

    .hero {
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        height: auto;
        min-height: 100vh;
        background-position: center top;
        animation: fadeInBackground 1.2s ease-out forwards;
    }

    .cards {
        position: relative;
        left: auto;
        bottom: auto;
        transform: none;
        width: 100%;
        margin-top: 40vh; 
        padding: 16px 16px 40px 16px;
        display: grid;
        grid-template-columns: 1fr 1fr; 
        gap: 12px;
        background: transparent;
        animation: fadeInCards 1s ease-out 0.2s both;
    }

    .card {
        width: 100%; 
        max-width: none;
        opacity: 0.9; 
        filter: none;
        background: transparent;
    }
}

@media(max-width: 400px) {
    .cards {
        margin-top: 32vh;
        gap: 8px;
        padding: 12px 8px 30px 8px;
    }
}

/* КИНЕМАТОГРАФИЧНЫЕ АНИМАЦИИ ВХОДА */
@keyframes fadeInBackground {
    from {
        opacity: 0;
        transform: scale(1.03); /* Легкий наплыв камеры при старте */
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

@keyframes fadeInCards {
    from {
        opacity: 0;
        transform: translate(-50%, 20px); /* Карточки мягко приподнимаются из небытия */
    }
    to {
        opacity: 1;
        transform: translate(-50%, 0);
    }
}

/* Для мобильных анимация карточек без сдвига по оси X */
@media(max-width: 800px) {
    @keyframes fadeInCards {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }
}
</style>
</head>

<body>

<section class="hero">
    <h1 class="visually-hidden">Hearthshire — Главная</h1>

    <div class="cards">
        <a href="estate.html" class="card">
            <img src="estate-card.png" alt="The Estate" width="280" height="270">
        </a>

        <a href="waterworks.html" class="card">
            <img src="waterworks-card.png" alt="Waterworks" width="280" height="270">
        </a>

        <a href="garden.html" class="card">
            <img src="garden-card.png" alt="Garden" width="280" height="270">
        </a>

        <a href="chronicle.html" class="card">
            <img src="chronicle-card.png" alt="Chronicle" width="280" height="270">
        </a>
    </div>
</section>

</body>
</html>
